<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adjust PH_lucy — Campaign 看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 28px;border-bottom:2px solid #2d3561;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.2rem;color:#fff}
header p{font-size:.74rem;color:#8888aa;margin-top:3px}
.nav-link{padding:6px 14px;border-radius:8px;background:#1e1e38;color:#aaa;text-decoration:none;font-size:.8rem;border:1px solid #2d3561;transition:all .18s}
.nav-link:hover{background:#e94560;color:#fff;border-color:#e94560}
.nav-link.active{background:#e94560;color:#fff;border-color:#e94560}
.platform-bar{display:flex;gap:0;padding:0 28px;background:#0d0d1a;border-bottom:2px solid #1e1e38}
.pt-tab{padding:10px 28px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:#555577;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s;letter-spacing:.3px}
.pt-tab:hover{color:#aaa}
.pt-tab.and-active{color:#e94560;border-bottom-color:#e94560}
.pt-tab.ios-active{color:#27ae60;border-bottom-color:#27ae60}
.filter-bar{display:flex;gap:9px;padding:11px 28px 14px;background:#111128;border-bottom:1px solid #1e1e38;flex-wrap:wrap;align-items:center;min-height:48px;row-gap:8px}
.filter-bar>span{font-size:.8rem;color:#8888aa}
.btn-p{padding:5px 15px;border-radius:18px;border:1.5px solid #2d3561;background:transparent;color:#888;cursor:pointer;font-size:.79rem;transition:all .18s}
.btn-p:hover{border-color:#e94560;color:#e94560}
.btn-p.active{background:#e94560;border-color:#e94560;color:#fff;font-weight:700}
.btn-p.ios-mode:hover{border-color:#27ae60;color:#27ae60}
.btn-p.ios-mode.active{background:#27ae60;border-color:#27ae60;color:#fff}
.info-bar{margin-left:auto;font-size:.72rem;color:#444466}
.refresh-btn{padding:5px 13px;border-radius:14px;border:1px solid #2d3561;background:transparent;color:#888;cursor:pointer;font-size:.75rem;transition:all .18s}
.refresh-btn:hover{border-color:#2ecc71;color:#2ecc71}
main{padding:20px 28px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:8px}
.card{background:#13132b;border-radius:10px;padding:14px 16px;border:1px solid #222248}
.card.ios-card{background:#13231a;border-color:#224433}
.card .lbl{font-size:.68rem;color:#8888aa;text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:1.4rem;font-weight:700;margin-top:6px}
.v-w{color:#fff}.v-r{color:#ff6b6b}.v-b{color:#53d8fb}.v-y{color:#ffd93d}.v-g{color:#2ecc71}
.total-note{font-size:.72rem;color:#666688;margin:0 0 20px 2px}
.ch-block{margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid #1e1e38}
.ch-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;flex-wrap:wrap;gap:8px}
.ch-name{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.ch-stats{display:flex;gap:14px;font-size:.76rem}
.ch-stat{display:flex;flex-direction:column;align-items:flex-end}
.s-lbl{color:#8888aa;font-size:.65rem;text-transform:uppercase}
.s-val{font-weight:600;margin-top:1px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.77rem}
thead th{background:#14143a;padding:8px 11px;text-align:right;color:#666688;font-weight:600;font-size:.67rem;text-transform:uppercase;white-space:nowrap}
thead th:first-child{text-align:left;padding-left:14px;min-width:200px}
thead th:nth-child(2){text-align:left;min-width:80px}
tbody tr{border-top:1px solid rgba(255,255,255,.04);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.025)}
td{padding:7px 11px;text-align:right;white-space:nowrap;color:#bbb}
td:first-child{text-align:left;padding-left:14px;color:#ddd;max-width:260px;overflow:hidden;text-overflow:ellipsis}
td:nth-child(2){text-align:left;color:#666688;font-size:.72rem}
.subtotal td{background:rgba(255,255,255,.04);font-weight:600;border-top:1px solid #2d3561!important}
.subtotal td:first-child{color:#fff}
.c-cost{color:#ff8080!important}.c-loan{color:#53d8fb!important}.c-na{color:#333355!important}
/* Adgroup 展开行 */
.ag-expand{cursor:pointer;display:inline-block;width:18px;text-align:center;font-weight:700;color:#666688;margin-right:4px;transition:all .15s;user-select:none}
.ag-expand:hover{color:#e94560}
.ag-expand.open{color:#e94560}
.ag-row{background:rgba(255,255,255,.012)}
.ag-row td{font-size:.7rem;color:#7777aa}
.ag-row td:first-child{padding-left:38px!important;max-width:280px}
.ag-row .ag-tag{font-size:.62rem;color:#555577;margin-left:6px}
.ag-spend{color:#cc6666!important}
.ag-total{border-top:1px dashed rgba(255,255,255,.06);font-weight:500}
.ag-total td:first-child{color:#ccc!important}
.badge{display:inline-block;padding:1px 8px;border-radius:8px;font-size:.71rem;font-weight:600}
.b-lo{background:rgba(46,204,113,.14);color:#2ecc71}
.b-mi{background:rgba(255,150,80,.12);color:#ff9050}
.b-hi{background:rgba(233,69,96,.18);color:#e94560}
.loading{text-align:center;padding:50px;color:#555577}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #2d3561;border-top-color:#e94560;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
.spinner.ios-spin{border-color:#2d5635;border-top-color:#27ae60}
@keyframes spin{to{transform:rotate(360deg)}}
.note-tag{font-size:.66rem;padding:1px 6px;border-radius:5px;background:#1e1e38;color:#8888aa;margin-left:6px;vertical-align:middle}
.platform-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:700;margin-left:8px;vertical-align:middle}
.and-badge{background:rgba(233,69,96,.18);color:#e94560;border:1px solid #e94560}
.ios-badge{background:rgba(39,174,96,.18);color:#27ae60;border:1px solid #27ae60}
tbody tr.clickable{cursor:pointer}
tbody tr.clickable.open{background:rgba(233,69,96,.06)}
.cmp-row td{padding:0!important;border:none!important;background:transparent!important}
.cmp-card{margin:4px 6px 14px 30px;background:#10102a;border:1px solid #26264e;border-radius:10px;padding:12px 14px}
.cmp-title{font-size:.74rem;color:#ffd93d;margin-bottom:8px;letter-spacing:.3px;font-weight:600}
.cmp-sub{font-size:.68rem;color:#8888aa;margin:12px 0 6px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.cmp-grid{overflow-x:auto;margin-bottom:4px}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:.74rem;min-width:520px}
.cmp-tbl th{background:#181840;color:#99a;font-size:.61rem;text-transform:uppercase;padding:5px 10px;text-align:right;font-weight:600;white-space:nowrap}
.cmp-tbl th:first-child{text-align:left;color:#ffd93d}
.cmp-tbl td{padding:5px 10px;text-align:right;color:#ccc;white-space:nowrap}
.cmp-tbl td:first-child{text-align:left;color:#ddd;font-weight:600}
.cmp-tbl tr+tr{border-top:1px solid rgba(255,255,255,.05)}
.cmp-tbl tr.loading-row td{color:#556;text-align:center}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-thumb{background:#2d3561;border-radius:2px}
</style>
</head>
<body>
<header>
  <div>
    <h1>📊 Adjust PH_lucy — Campaign 看板 <span id="hdr-badge" class="platform-badge and-badge">Android</span></h1>
    <p id="hdr-sub">三大核心渠道 Campaign 明细 · Attribution source: First · UTC+8</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <a href="/" class="nav-link">Channel</a>
    <a href="/campaign" class="nav-link active">Campaign</a>
  </div>
</header>
<div class="platform-bar">
  <button class="pt-tab and-active" id="tab-and" onclick="switchPlatform('android')">🤖 Android</button>
  <button class="pt-tab" id="tab-ios" onclick="switchPlatform('ios')">🍎 iOS</button>
</div>
<div class="filter-bar">
  <span>📅 主表 = <b style="color:#e94560">今日实时</b> · 点击 Campaign 行查看该 Campaign 及其 Adgroup 的 5 日期对比</span>
  <button class="refresh-btn" onclick="refresh()">🔄 刷新</button>
  <span class="info-bar" id="ib">—</span>
</div>
<main id="main"><div class="loading"><div class="spinner"></div><br>加载中…</div></main>
<script>
let PLATFORM='android';
const AND_KEY_CH=['Google Ads','Facebook','TikTok for Business'];
const IOS_KEY_CH=['Facebook','TikTok for Business','Apple'];
const AND_CH_CFG={'Google Ads':{bg:'#0a2040',border:'1px solid #1a4a8f',dot:'#4a9eff',label:'🔵 Google Ads'},'Facebook':{bg:'#0a1830',border:'1px solid #1a3a8f',dot:'#1877f2',label:'🔷 Facebook'},'TikTok for Business':{bg:'#150a20',border:'1px solid #8f1a3a',dot:'#ff2d55',label:'🔴 TikTok for Business'}};
const IOS_CH_CFG={'Facebook':{bg:'#0a1830',border:'1px solid #1a3a8f',dot:'#1877f2',label:'🔷 Facebook iOS'},'TikTok for Business':{bg:'#150a20',border:'1px solid #8f1a3a',dot:'#ff2d55',label:'🔴 TikTok iOS'},'Apple':{bg:'#0a1a0a',border:'1px solid #1a5a1a',dot:'#27ae60',label:'🍎 Apple Search Ads (ASA)'}};
const DATES=[['today','今日'],['yesterday','昨日'],['3days','近3天'],['7days','近7天'],['month','本月']];
const CMP_METRICS=[['installs','Installs'],['cost','Ad Spend'],['register','Register'],['apply','Apply'],['loan','Loan'],['revenue','Revenue'],['cps','CPS']];
const ALL={android:{},ios:{}};
const n=v=>v==null?'—':Number(v).toLocaleString();
const m=v=>(!v&&v!==0)||v===0?'—':'$'+Number(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const cpsHtml=v=>{if(!v||v===0)return '<span class="c-na">—</span>';const c=v<20?'b-lo':v<30?'b-mi':'b-hi';return `<span class="badge ${c}">$${Number(v).toFixed(2)}</span>`;};
function fmtMetric(mk,v){if(mk==='cps')return cpsHtml(v);if(mk==='cost'||mk==='revenue')return m(v);return n(v);}
function thead(){return `<thead><tr><th style="text-align:left">Campaign Name</th><th>Ad Spend($)</th><th>Installs</th><th>Register</th><th>Apply</th><th>Loan</th><th>Revenue($)</th><th>CPS</th></tr></thead>`;}
function campRow(r,ch,idx){const camp=r.campaign||'—';const safe=camp.replace(/"/g,'&quot;');const chSafe=ch.replace(/"/g,'&quot;');return `<tr class="clickable" data-ch="${chSafe}" data-camp="${safe}" onclick="toggleCmp(this)"><td title="${camp}">${camp}</td><td class="c-cost">${m(r.cost)}</td><td>${n(r.installs)}</td><td>${n(r.register)}</td><td>${n(r.apply)}</td><td class="c-loan">${n(r.loan)}</td><td>${m(r.revenue)}</td><td>${cpsHtml(r.cps)}</td></tr>`;}
function findCampRow(pdata,ch,camp){if(!pdata||typeof pdata==='string')return null;return (pdata.by_campaign||[]).find(r=>r.channel===ch&&r.campaign===camp)||null;}
function findAdgroups(pdata,ch,camp){if(!pdata||typeof pdata==='string')return null;const ag=pdata.adgroups||{};const chMap=ag[ch]||{};return chMap[camp]||null;}
function findAgRow(pdata,ch,camp,agName){const list=findAdgroups(pdata,ch,camp);if(!list)return null;const a=list.find(x=>x.name===agName);if(!a)return null;return {installs:a.installs,cost:a.spend,register:a.register,apply:a.apply,loan:a.loan,revenue:a.revenue,cps:a.cps};}
function cmpTable(title,getRowFn){const store=ALL[PLATFORM];let head='<th>日期</th>'+CMP_METRICS.map(a=>`<th>${a[1]}</th>`).join('');let body='';for(const dd of DATES){const dk=dd[0],dl=dd[1];const pdata=store[dk];if(pdata==='loading'||pdata===undefined){body+=`<tr class="loading-row"><td>${dl}</td><td colspan="${CMP_METRICS.length}">⏳ 加载中…</td></tr>`;continue;}if(pdata==='error'){body+=`<tr class="loading-row"><td>${dl}</td><td colspan="${CMP_METRICS.length}" style="color:#e94560">❌ 加载失败</td></tr>`;continue;}const r=getRowFn(pdata)||{};body+=`<tr><td>${dl}</td>`+CMP_METRICS.map(a=>`<td>${fmtMetric(a[0],r[a[0]])}</td>`).join('')+'</tr>';}return `<div class="cmp-grid"><table class="cmp-tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;}
function collectAgNames(ch,camp){const store=ALL[PLATFORM];const set=new Set();for(const dd of DATES){const list=findAdgroups(store[dd[0]],ch,camp);if(list)list.forEach(a=>set.add(a.name));}return [...set];}
function cmpCard(ch,camp){let html=`<div class="cmp-card"><div class="cmp-title">📊 ${camp} — 5 日期对比（Campaign 汇总）</div>`;html+=cmpTable(camp,pd=>findCampRow(pd,ch,camp));const agNames=collectAgNames(ch,camp);if(agNames.length){html+=`<div class="cmp-sub">▾ Adgroup 明细（各 ${agNames.length} 个广告组的 5 日期对比）</div>`;agNames.forEach(agn=>{html+=`<div class="cmp-title" style="color:#88bbdd;font-size:.7rem;margin:10px 0 4px">• ${agn}</div>`;html+=cmpTable(agn,pd=>findAgRow(pd,ch,camp,agn));});}else{html+=`<div class="cmp-sub" style="color:#556">该 Campaign 无 Adgroup 明细（spend=0 不展开）</div>`;}html+='</div>';return html;}
function toggleCmp(tr){const ch=tr.getAttribute('data-ch');const camp=tr.getAttribute('data-camp');const open=tr.classList.toggle('open');const next=tr.nextElementSibling;if(open){const cmpTr=document.createElement('tr');cmpTr.className='cmp-row';cmpTr.innerHTML=`<td colspan="${tr.children.length}">${cmpCard(ch,camp)}</td>`;tr.parentNode.insertBefore(cmpTr,next);}else{if(next&&next.classList.contains('cmp-row'))next.remove();}}
function refreshOpenCards(){document.querySelectorAll('tr.clickable.open').forEach(tr=>{const next=tr.nextElementSibling;if(next&&next.classList.contains('cmp-row')){next.querySelector('td').innerHTML=cmpCard(tr.getAttribute('data-ch'),tr.getAttribute('data-camp'));}});}
function render(){const store=ALL[PLATFORM];const d=store['today'];if(d==='loading'||d===undefined){document.getElementById('main').innerHTML=`<div class="loading"><div class="spinner${PLATFORM==='ios'?' ios-spin':''}"></div><br>拉取今日实时数据…</div>`;return;}if(d==='error'){document.getElementById('main').innerHTML='<div class="loading" style="color:#e94560">❌ 今日数据加载失败，请点刷新重试</div>';return;}
  const t=d.total;
  document.getElementById('ib').textContent=`主表：${d.start}（今日实时）  |  拉取：${d.pulled_at}`;
  const KEY_CH=PLATFORM==='ios'?IOS_KEY_CH:AND_KEY_CH;
  const CH_CFG=PLATFORM==='ios'?IOS_CH_CFG:AND_CH_CFG;
  const iosCard=PLATFORM==='ios'?' ios-card':'';
  let cards=`<div class="cards">
    <div class="card${iosCard}"><div class="lbl">Installs</div><div class="val v-g">${n(t.installs)}</div></div>
    <div class="card${iosCard}"><div class="lbl">Ad Spend</div><div class="val v-r">${m(t.cost)}</div></div>
    <div class="card${iosCard}"><div class="lbl">Register</div><div class="val v-w">${n(t.register)}</div></div>
    <div class="card${iosCard}"><div class="lbl">Apply Loan</div><div class="val v-w">${n(t.apply)}</div></div>
    <div class="card${iosCard}"><div class="lbl">Loan Success</div><div class="val v-b">${n(t.loan)}</div></div>
    <div class="card${iosCard}"><div class="lbl">Revenue</div><div class="val v-w">${m(t.revenue)}</div></div>
    <div class="card${iosCard}"><div class="lbl">CPS</div><div class="val v-y">${t.cps?'$'+t.cps.toFixed(2):'—'}</div></div>
  </div>
  <div class="total-note">ℹ️ Total 为全渠道汇总（含长尾渠道），与 Adjust 后台一致；下方明细仅三大核心付费渠道 · 点击 Campaign 行看 5 日期对比</div>`;
  let blocks='';
  for(const ch of KEY_CH){const cfg=CH_CFG[ch];const ct=(d.channel_totals||{})[ch]||{};const rows=d.by_campaign.filter(r=>r.channel===ch);if(!rows.length)continue;
    const subtotalRow=`<tr class="subtotal"><td>📊 ${ch} 小计</td><td class="c-cost" style="font-weight:700">${m(ct.cost)}</td><td>${n(ct.installs)}</td><td>${n(ct.register)}</td><td>${n(ct.apply)}</td><td class="c-loan" style="font-weight:700">${n(ct.loan)}</td><td>${m(ct.revenue)}</td><td>${cpsHtml(ct.cps)}</td></tr>`;
    blocks+=`<div class="ch-block" style="border:${cfg.border}"><div class="ch-header" style="background:${cfg.bg}"><div class="ch-name"><span style="width:10px;height:10px;border-radius:50%;background:${cfg.dot};display:inline-block"></span>${cfg.label}</div><div class="ch-stats"><div class="ch-stat"><span class="s-lbl">Ad Spend</span><span class="s-val" style="color:#ff8080">${m(ct.cost)}</span></div><div class="ch-stat"><span class="s-lbl">Loan</span><span class="s-val" style="color:#53d8fb">${n(ct.loan)}</span></div><div class="ch-stat"><span class="s-lbl">CPS</span><span class="s-val" style="color:#ffd93d">${ct.cps?'$'+ct.cps.toFixed(2):'—'}</span></div><div class="ch-stat"><span class="s-lbl">Campaigns</span><span class="s-val" style="color:#aaa">${rows.length}</span></div></div></div>
      <div class="tbl-wrap"><table>${thead()}<tbody>${rows.map((r,i)=>campRow(r,ch,i)).join('')}${subtotalRow}</tbody></table></div></div>`;}
  document.getElementById('main').innerHTML=cards+blocks;
}
function applyTheme(p){const isIos=p==='ios';document.getElementById('hdr-badge').className='platform-badge '+(isIos?'ios-badge':'and-badge');document.getElementById('hdr-badge').textContent=isIos?'iOS':'Android';document.getElementById('hdr-sub').textContent=isIos?'iOS 核心渠道 Campaign 明细 · Attribution source: First · UTC+8':'三大核心渠道 Campaign 明细 · Attribution source: First · UTC+8';document.getElementById('tab-and').className='pt-tab'+(isIos?'':' and-active');document.getElementById('tab-ios').className='pt-tab'+(isIos?' ios-active':'');}
function fetchPeriod(platform,period){const api=platform==='ios'?'/api/ios/campaign':'/api/campaign';ALL[platform][period]='loading';return fetch(api+'?period='+period).then(r=>r.json()).then(d=>{ALL[platform][period]=d.ok?d:'error';}).catch(()=>{ALL[platform][period]='error';}).then(()=>{if(period==='today'&&platform===PLATFORM)render();else refreshOpenCards();});}
function loadAll(platform){fetchPeriod(platform,'today');['yesterday','3days','7days','month'].forEach(p=>fetchPeriod(platform,p));}
function refresh(){ALL[PLATFORM]={};document.getElementById('main').innerHTML=`<div class="loading"><div class="spinner${PLATFORM==='ios'?' ios-spin':''}"></div><br>拉取中…</div>`;loadAll(PLATFORM);}
function switchPlatform(p){PLATFORM=p;applyTheme(p);if(!ALL[p]['today']){document.getElementById('main').innerHTML=`<div class="loading"><div class="spinner${p==='ios'?' ios-spin':''}"></div><br>拉取中…</div>`;loadAll(p);}else{render();}}
loadAll('android');
</script>
</body>
</html>
