<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pesoloan V8</title><style>*{box-sizing:border-box}body{margin:0;background:#0d1117;color:#e6edf3;font:13px Arial,"Microsoft YaHei"}.top{height:52px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;background:#172238}.brand{font-size:17px;font-weight:700;color:#58a6ff}.green{color:#3fb950}.red{color:#f85149}.muted{color:#8b949e}.wrap{max-width:1500px;margin:auto;padding:16px}.note{padding:10px 14px;border:1px solid #9e6a03;background:#2b220d;color:#e3b341;border-radius:8px;margin-bottom:14px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.card,.panel{background:#161b22;border:1px solid #30363d;border-radius:9px}.card{padding:15px;text-align:center}.v{font-size:25px;font-weight:700}.l{color:#8b949e;font-size:11px;margin-top:4px}.hd{padding:12px 16px;background:#1c2128}.tabs,.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tabs{margin-bottom:10px}.tab,select{background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:6px 12px}.tab.on{color:#3fb950;border-color:#2ea043}.ios.on{color:#58a6ff;border-color:#1f6feb}.metrics{display:flex;border-bottom:1px solid #30363d}.metric{padding:13px 18px;border-right:1px solid #30363d;min-width:190px}.metric small{display:block;color:#8b949e}.metric b{font-size:20px}.chart{padding:12px 16px;position:relative}.legend{text-align:right;color:#8b949e}.svgbox{width:100%;height:320px;cursor:crosshair}.tip{position:absolute;display:none;pointer-events:none;min-width:220px;padding:10px;background:#1c2128;border:1px solid #30363d;border-radius:7px;box-shadow:0 6px 20px #000}.row{display:flex;justify-content:space-between;gap:16px}table{width:100%;border-collapse:collapse}th,td{padding:8px 12px;border-bottom:1px solid #21262d;text-align:left}th{color:#8b949e;font-size:11px}.ok{color:#3fb950}.warn{color:#e3b341}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.metrics{flex-wrap:wrap}}</style></head><body><header class="top"><div class="brand">📊 Pesoloan · 实时同期消耗看板</div><div><span class="green">● LIVE</span>　截止：2026-07-14 15:20</div></header><main class="wrap"><div class="note">曲线：每小时实际花费（非累计），昨日显示完整24小时；顶部及明细表：截至15:20累计消耗及昨日同期环比。</div><div class="kpis"><div class="card"><div class="v green">$10,319.53</div><div class="l">Android 今日累计</div><div class="l red">较昨日同期 +2.38%</div></div><div class="card"><div class="v" style="color:#58a6ff">$4,863.11</div><div class="l">iOS 今日累计</div><div class="l green">较昨日同期 -1.16%</div></div><div class="card"><div class="v">$15,182.64</div><div class="l">双端今日累计</div><div class="l red">较昨日同期 +1.22%</div></div><div class="card"><div class="v" style="color:#e3b341">小时</div><div class="l">曲线统计粒度</div></div></div><section class="panel"><div class="hd"><div class="tabs"><button class="tab on" id="and">🤖 Android</button><button class="tab ios" id="ios">🍎 iOS</button></div><div class="filters"><select id="level"><option value="all">所有广告账户</option><option value="channel">按渠道</option></select><select id="channel" hidden></select><select id="account" hidden></select></div></div><div class="metrics"><div class="metric"><b class="green" id="mt"></b><small>今日截至15:20累计</small></div><div class="metric"><b class="muted" id="my"></b><small>昨日截至15:20累计</small></div><div class="metric"><b id="mp"></b><small>累计同期环比</small></div><div class="metric"><b id="ms"></b><small>当前范围</small></div></div><div class="chart"><div class="legend">━ 今日每小时　┄ 昨日同小时（完整24小时）</div><svg id="svg" class="svgbox" viewBox="0 0 1200 320"></svg><div id="tip" class="tip"></div></div><table><thead><tr><th>渠道 / 账户</th><th>今日累计</th><th>昨日同期累计</th><th>环比</th><th>状态</th></tr></thead><tbody id="tbody"></tbody></table></section></main><script>'use strict';let DATA={android:{all:{t:0,y:0},channels:{}},ios:{all:{t:0,y:0},channels:{}}},HOURS={android:{},ios:{}},ACCOUNT_Y={android:{},ios:{}},CURRENT_HOUR=23;const SHAPE=[];let side='android',locked=false,currentHourly={};const $=id=>document.getElementById(id),money=n=>'$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});function fill(){const c=$('channel');c.innerHTML='<option value="">选择渠道</option>'+Object.keys(DATA[side].channels).map(x=>'<option>'+x+'</option>').join('');$('level').value='all';c.hidden=true;$('account').hidden=true}function selected(){const b=DATA[side],ch=$('channel').value,ac=$('account').value;if($('level').value==='all'||!ch)return{t:b.all.t,y:b.all.y,label:(side==='android'?'Android':'iOS')+' 全渠道',rows:Object.entries(b.channels).map(([n,v])=>({n,t:v.t,y:v.y}))};const c=b.channels[ch];if(!ac)return{t:c.t,y:c.y,label:ch+' 渠道',rows:Object.entries(c.a).map(([n,t])=>({n,t,y:ACCOUNT_Y[side]?.[ch]?.[n]||0}))};const t=c.a[ac],y=ACCOUNT_Y[side]?.[ch]?.[ac]||0;return{t,y,label:ac,rows:[{n:ac,t,y}]} }function refresh(){const d=selected(),p=(d.t/d.y-1)*100;$('mt').textContent=money(d.t);$('my').textContent=money(d.y);$('mp').textContent=(p>=0?'+':'')+p.toFixed(2)+'%';$('mp').className=p>0?'red':p<-25?'warn':p<0?'green':'muted';$('ms').textContent=d.label;$('tbody').innerHTML=d.rows.map(r=>{const z=(r.t/r.y-1)*100;return `<tr><td>${r.n}</td><td>${money(r.t)}</td><td>${money(r.y)}</td><td class="${z>0?'red':z<-25?'warn':z<0?'green':'muted'}">${z>=0?'+':''}${z.toFixed(2)}%</td><td class="${z<-25?'warn':'ok'}">${z<-25?'⚠️ 下降超25%':'✅ 正常'}</td></tr>`}).join('');currentHourly=selectedHourly();draw()}function switchSide(s){side=s;$('and').className='tab'+(s==='android'?' on':'');$('ios').className='tab ios'+(s==='ios'?' on':'');fill();refresh()}$('and').onclick=()=>switchSide('android');$('ios').onclick=()=>switchSide('ios');$('level').onchange=()=>{const on=$('level').value==='channel';$('channel').hidden=!on;$('account').hidden=true;refresh()};$('channel').onchange=()=>{const ch=$('channel').value,a=$('account');if(!ch){a.hidden=true;refresh();return}a.innerHTML='<option value="">渠道汇总</option>'+Object.keys(DATA[side].channels[ch].a).map(x=>'<option>'+x+'</option>').join('');a.hidden=false;refresh()};$('account').onchange=refresh;function draw(){const svg=$('svg'),W=1200,H=320,P={l:70,r:25,t:20,b:40},cw=W-P.l-P.r,ch=H-P.t-P.b,T=currentHourly.today,Y=currentHourly.yesterday,max=Math.max(...T,...Y)*1.15,X=i=>P.l+cw*i/23,V=v=>P.t+ch*(1-v/max),color=side==='android'?'#3fb950':'#58a6ff';let h='';for(let i=0;i<=5;i++){const val=max*i/5,y=P.t+ch*(1-i/5);h+=`<line x1="${P.l}" y1="${y}" x2="${P.l+cw}" y2="${y}" stroke="#21262d"/><text x="${P.l-8}" y="${y+4}" fill="#8b949e" font-size="11" text-anchor="end">$${Math.round(val)}</text>`}for(let i=0;i<24;i+=2)h+=`<text x="${X(i)}" y="${H-13}" fill="#8b949e" font-size="11" text-anchor="middle">${String(i).padStart(2,'0')}:00</text>`;h+=`<text x="${P.l+cw}" y="${H-13}" fill="#8b949e" font-size="11" text-anchor="end">24:00</text><polyline points="${Y.map((v,i)=>X(i)+','+V(v)).join(' ')}" fill="none" stroke="#8b949e" stroke-width="2" stroke-dasharray="7 6"/><polyline points="${T.map((v,i)=>v==null?'':X(i)+','+V(v)).filter(Boolean).join(' ')}" fill="none" stroke="${color}" stroke-width="3"/>`;for(let i=0;i<24;i++)h+=`<rect class="hit" data-i="${i}" x="${X(i)-cw/48}" y="${P.t}" width="${cw/24}" height="${ch}" fill="transparent"/>`;svg.innerHTML=h;svg.querySelectorAll('.hit').forEach(el=>{el.onmousemove=e=>{if(!locked)show(e,+el.dataset.i,X)};el.onmouseleave=()=>{if(!locked)$('tip').style.display='none'};el.onclick=e=>{locked=!locked;show(e,+el.dataset.i,X)}})}function show(e,i,X){const T=currentHourly.today,Y=currentHourly.yesterday,tv=T[i],yv=Y[i],df=tv==null?null:tv-yv,pc=tv==null?null:df/yv*100,tip=$('tip'),r=$('svg').getBoundingClientRect();tip.innerHTML=`<b>${String(i).padStart(2,'0')}:00–${String(i+1).padStart(2,'0')}:00</b><div class="row"><span>今日该小时</span><strong class="green">${tv==null?'尚未发生':money(tv)}</strong></div><div class="row"><span>昨日同小时</span><strong>${money(yv)}</strong></div>${tv==null?'':`<div class="row"><span>小时差额</span><strong class="${df>0?'red':pc<-25?'warn':df<0?'green':'muted'}">${df>=0?'+':''}${money(df)}</strong></div><div class="row"><span>小时偏差</span><strong class="${pc>0?'red':pc<-25?'warn':pc<0?'green':'muted'}">${pc>=0?'+':''}${pc.toFixed(2)}%</strong></div>`}`;tip.style.display='block';let left=X(i)/1200*r.width+18;if(left+235>r.width)left-=245;tip.style.left=left+'px';tip.style.top='48px'}function selectedHourly(){const ch=$('channel').value,ac=$('account').value,b=HOURS[side]||{};let x;if($('level').value==='all'||!ch)x=b.all;else if(!ac)x=b.channels?.[ch];else x=b.accounts?.[ch]?.[ac];x=x||{today:Array(24).fill(0),yesterday:Array(24).fill(0)};return{today:x.today.map((v,i)=>i>CURRENT_HOUR?null:v),yesterday:x.yesterday}}function sumTo(a,n){return(a||[]).slice(0,n+1).reduce((s,v)=>s+(Number(v)||0),0)}async function loadReal(){try{const r=await fetch('/dashboard-api/hourly-spend',{cache:'no-store'}),j=await r.json();if(!r.ok||!j.ok)throw Error(j.error||'读取失败');CURRENT_HOUR=j.current_hour;for(const s of ['android','ios']){let channels={},ha={all:{today:j[s].today,yesterday:j[s].yesterday},channels:{},accounts:{}};for(const [ch,node] of Object.entries(j[s].channels||{})){let a={};ha.channels[ch]={today:node.today,yesterday:node.yesterday};ha.accounts[ch]={};for(const [id,v] of Object.entries(node.accounts||{})){const label=(v.name||id)+' · '+id,t=sumTo(v.today,CURRENT_HOUR),y=sumTo(v.yesterday,CURRENT_HOUR);a[label]=t;ha.accounts[ch][label]={today:v.today,yesterday:v.yesterday}}channels[ch]={t:sumTo(node.today,CURRENT_HOUR),y:sumTo(node.yesterday,CURRENT_HOUR),a};ACCOUNT_Y[s][ch]=Object.fromEntries(Object.entries(node.accounts||{}).map(([id,v])=>[(v.name||id)+' · '+id,sumTo(v.yesterday,CURRENT_HOUR)]))}DATA[s]={all:{t:sumTo(j[s].today,CURRENT_HOUR),y:sumTo(j[s].yesterday,CURRENT_HOUR)},channels};HOURS[s]=ha}const ks=document.querySelectorAll('.kpis .card'),at=DATA.android.all.t,ay=DATA.android.all.y,it=DATA.ios.all.t,iy=DATA.ios.all.y;function kp(el,v,y){el.querySelector('.v').textContent=money(v);const p=y?(v/y-1)*100:0,l=el.querySelectorAll('.l')[1];l.textContent='较昨日同期 '+(p>=0?'+':'')+p.toFixed(2)+'%';l.className='l '+(p>0?'red':p<-25?'warn':p<0?'green':'muted')}kp(ks[0],at,ay);kp(ks[1],it,iy);kp(ks[2],at+it,ay+iy);document.querySelector('.top div:last-child').innerHTML='<span class="green">● LIVE</span>　截止：'+j.data_time.replace('T',' ').slice(0,16);document.querySelector('.note').textContent='曲线：每小时实际花费（非累计），昨日显示完整24小时；顶部及明细表：截至'+String(CURRENT_HOUR).padStart(2,'0')+':59累计消耗及昨日同期环比。';document.querySelectorAll('.metric small')[0].textContent='今日截至'+String(CURRENT_HOUR).padStart(2,'0')+':59累计';document.querySelectorAll('.metric small')[1].textContent='昨日截至'+String(CURRENT_HOUR).padStart(2,'0')+':59累计';fill();refresh()}catch(e){document.querySelector('.note').textContent='实时数据加载失败：'+e.message}}loadReal();setInterval(loadReal,300000);</script></body></html>
