<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pesoloan 被拒素材预警</title><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#738096;--red:#dc3545;--green:#16a36a;--line:#e7ebf2}*{box-sizing:border-box}body{margin:0;background:var(--bg);font:14px Arial;color:var(--text)}header{padding:22px 3%;background:#14213d;color:#fff}h1{margin:0 0 7px;font-size:24px}.sub{color:#b8c4d9}.wrap{padding:20px 3%}.bar,.cards,.filters{display:flex;gap:12px;flex-wrap:wrap}.card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 10px #16213e12}.stat{min-width:170px;flex:1}.num{font-size:27px;font-weight:700;margin-top:8px}.bad{color:var(--red)}.ok{color:var(--green)}button,select,input{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px}button{cursor:pointer}.filters{margin:16px 0}.filters>*{min-width:145px}.grow{flex:1}.tablebox{overflow:auto;padding:0}table{border-collapse:collapse;width:100%;min-width:1450px}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f8fafc;position:sticky;top:0}.tag{padding:4px 8px;border-radius:12px;font-size:12px;background:#eef2f7}.tag.facebook{color:#1877f2}.tag.google{color:#4285f4}.tag.tiktok{color:#111}.err{background:#fff1f2;color:#b42332}.empty{text-align:center;padding:45px;color:var(--muted)}.copy{padding:4px 7px;font-size:12px}.foot{color:var(--muted);margin-top:12px}</style></head><body><header><h1>被拒素材与账户异常预警</h1><div class="sub">Android：Google / Facebook / TikTok　｜　iOS：Facebook / TikTok</div></header><main class="wrap"><section class="cards" style="margin-top:16px"><div class="card stat">监控账户<div class="num" id="monitored">—</div></div><div class="card stat">被拒/异常条目<div class="num bad" id="rejected">—</div></div><div class="card stat">采集失败账户<div class="num" id="errors">—</div></div><div class="card stat">数据时间<div class="num" id="time" style="font-size:15px">—</div></div></section><section class="filters"><select id="side" onchange="render()"><option value="">全部端口</option><option>Android</option><option>iOS</option></select><select id="channel" onchange="render()"><option value="">全部渠道</option><option value="google">Google</option><option value="facebook">Facebook</option><option value="tiktok">TikTok</option></select><select id="status" onchange="render()"><option value="">全部采集状态</option><option value="ok">采集成功</option><option value="error">采集失败</option></select><input id="q" class="grow" placeholder="搜索账户、ID、Campaign、素材、原因" oninput="render()"></section><section class="card tablebox"><table><thead><tr><th>端口</th><th>渠道</th><th>账户名 / ID</th><th>账户状态</th><th>审核状态</th><th>Campaign</th><th>Ad Group</th><th>广告 / 素材 ID</th><th>拒绝原因 / 政策主题</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="rows"><tr><td colspan="11" class="empty">请输入代理地址和 API Key 后连接</td></tr></tbody></table></section><div class="foot">接口失败会明确标红，不会显示为“零拒登”。页面不会持久化 API Key。</div></main><script>
let items=[]; const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function copyText(s){navigator.clipboard.writeText(String(s||''))}function topics(x){return (x.policy_topics||[]).map(t=>t.topic||t).filter(Boolean).join('；')}
async function loadData(){document.querySelector('#rows').innerHTML='<tr><td colspan="11" class="empty">正在读取真实数据…</td></tr>';try{let r=await fetch('/dashboard-api/rejected-creatives',{cache:'no-store'});let j=await r.json().catch(()=>({}));if(!r.ok||!j.ok)throw Error(j.error||('HTTP '+r.status));items=j.items||[];if(!items.length&&Array.isArray(j.accounts)){items=j.accounts.flatMap(a=>{let ads=a.rejected_ads||[];if(a.source_status!=='ok')return [{...a,review_status:null}];return ads.map(ad=>({...a,...ad,account_name:a.account_name||ad.account_name,review_status:ad.review_status||ad.effective_status,adgroup_name:ad.adgroup_name||ad.adset_name,reject_reason:ad.reject_reason||(ad.reject_reasons||[]).join('；')}))})}let s=j.summary||{monitored:(j.accounts||[]).length,rejected:j.total_rejected||0,source_errors:(j.accounts||[]).filter(a=>a.source_status!=='ok').length};document.querySelector('#monitored').textContent=s.monitored??(j.monitored_accounts||[]).length;document.querySelector('#rejected').textContent=s.rejected??items.filter(x=>x.review_status).length;document.querySelector('#errors').textContent=s.source_errors??items.filter(x=>x.source_status!=='ok').length;document.querySelector('#time').textContent=j.data_time||'—';render()}catch(e){items=[];document.querySelector('#rows').innerHTML='<tr><td colspan="11" class="empty err">连接失败：'+esc(e.message)+'。请检查部署、地址、API Key 与跨域配置。</td></tr>';document.querySelector('#errors').textContent='连接失败'}}
loadData();setInterval(loadData,300000);function render(){let side=document.querySelector('#side').value.toLowerCase(),ch=document.querySelector('#channel').value,st=document.querySelector('#status').value,q=document.querySelector('#q').value.toLowerCase();let a=items.filter(x=>(!side||String(x.side).toLowerCase()===side)&&(!ch||x.channel===ch)&&(!st||(st==='ok'?x.source_status==='ok':x.source_status!=='ok'))&&(!q||JSON.stringify(x).toLowerCase().includes(q)));let tb=document.querySelector('#rows');if(!a.length){tb.innerHTML='<tr><td colspan="11" class="empty">当前筛选范围无被拒条目；请同时确认“采集失败账户”为 0。</td></tr>';return}tb.innerHTML=a.map(x=>{let bad=x.source_status!=='ok';let reason=bad?('采集失败：'+(x.source_error||'未知错误')):(x.reject_reason||topics(x)||'—');return `<tr class="${bad?'err':''}"><td>${esc(x.side)}</td><td><span class="tag ${esc(x.channel)}">${esc(x.channel)}</span></td><td><b>${esc(x.account_name||'—')}</b><br>${esc(x.account_id)} <button class="copy" onclick="copyText('${esc(x.account_id)}')">复制</button></td><td>${esc(x.account_status||'—')}</td><td>${esc(x.review_status||'—')}</td><td>${esc(x.campaign_name||'—')}<br>${esc(x.campaign_id||'')}</td><td>${esc(x.adgroup_name||'—')}<br>${esc(x.adgroup_id||'')}</td><td>${esc(x.ad_name||'—')}<br>Ad: ${esc(x.ad_id||'—')}<br>Creative: ${esc(x.creative_id||'—')}</td><td>${esc(reason)}${topics(x)&&topics(x)!==reason?'<br>'+esc(topics(x)):''}</td><td>${esc(x.updated_at||x.data_time||'—')}</td><td>${x.preview_url?`<a href="${esc(x.preview_url)}" target="_blank">预览</a>`:'—'}</td></tr>`}).join('')}
</script></body></html>
